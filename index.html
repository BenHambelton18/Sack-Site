<!-- FIXED MODERN SITE WITH ALL PRODUCTS + WORKING CART -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hacky Sack Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0b0b0c;
  --card:#151517;
  --accent:#7c3aed;
  --text:#f9fafb;
}
body {margin:0;font-family:Inter;background:var(--bg);color:var(--text);} 
header {display:flex;justify-content:space-between;align-items:center;padding:20px 40px;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10;}
.logo {font-weight:700;}
.cart-btn {background:var(--accent);padding:10px 15px;border-radius:999px;cursor:pointer;}

.container {display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;padding:40px;}
.product {background:var(--card);border-radius:20px;overflow:hidden;transition:.3s;}
.product:hover {transform:translateY(-8px);} 
.product img {width:100%;height:220px;object-fit:cover;} 
.product-content {padding:15px;} 
.price {color:var(--accent);} 
button {padding:10px;border:none;border-radius:10px;cursor:pointer;} 
.primary {background:var(--accent);color:white;} 

/* CART */
.cart-panel {
  position:fixed;
  top:0;
  right:-400px;
  width:350px;
  height:100%;
  background:var(--card);
  padding:20px;
  transition:0.3s;
  overflow-y:auto;
  z-index:20;
}
.cart-panel.open {right:0;}

.overlay {
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:15;
}
.overlay.show {display:block;}

.cart-item {display:flex;justify-content:space-between;align-items:center;margin:10px 0;}
.qty {display:flex;gap:5px;}
.qty button {padding:5px 10px;}

</style>
</head>
<body>

<header>
<div class="logo">Hacky Sack Co.</div>
<div class="cart-btn" onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</div>
</header>

<div class="container">

<!-- PRODUCT 1 -->
<div class="product">
<img src="images/product1.jpg">
<div class="product-content">
<h3>Starter Bundle</h3>
<p class="price">$19.99</p>
<button class="primary" onclick="addToCart('Starter Bundle',19.99)">Add</button>
</div>
</div>

<!-- PRODUCT 2 -->
<div class="product">
<img src="images/product2.jpg">
<div class="product-content">
<h3>Pro Sack</h3>
<p class="price">$9.99</p>
<button class="primary" onclick="addToCart('Pro Sack',9.99)">Add</button>
</div>
</div>

<!-- PRODUCT 3 (FIXED) -->
<div class="product">
<img src="images/product3.jpg">
<div class="product-content">
<h3>Training Guide</h3>
<p class="price">$4.99</p>
<button class="primary" onclick="addToCart('Training Guide',4.99)">Add</button>
</div>
</div>

<!-- PRODUCT 4 -->
<div class="product">
<img src="images/product4.jpg">
<div class="product-content">
<h3>Mega Pack</h3>
<p class="price">$29.99</p>
<button class="primary" onclick="addToCart('Mega Pack',29.99)">Add</button>
</div>
</div>

</div>

<!-- CART PANEL -->
<div class="cart-panel" id="cartPanel">
<h2>Your Cart</h2>
<div id="cart-items"></div>
<h3 id="total"></h3>
</div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];

function saveCart(){
  localStorage.setItem('cart', JSON.stringify(cart));
}

function addToCart(name, price){
  let existing = cart.find(item => item.name === name);
  if(existing){ existing.qty++; }
  else { cart.push({name, price, qty:1}); }
  saveCart();
  renderCart();
}

function changeQty(name, delta){
  let item = cart.find(i => i.name === name);
  if(!item) return;
  item.qty += delta;
  if(item.qty <= 0){ cart = cart.filter(i => i.name !== name); }
  saveCart();
  renderCart();
}

function renderCart(){
  let container = document.getElementById('cart-items');
  container.innerHTML = '';
  let total = 0;

  cart.forEach(item => {
    total += item.price * item.qty;
    container.innerHTML += `
      <div class="cart-item">
        <div>${item.name}<br>$${item.price}</div>
        <div class="qty">
          <button onclick="changeQty('${item.name}', -1)">-</button>
          <span>${item.qty}</span>
          <button onclick="changeQty('${item.name}', 1)">+</button>
        </div>
      </div>`;
  });

  document.getElementById('total').innerTex
