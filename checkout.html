
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout</title>
  <style>
    body { font-family: Arial; background: #111; color: white; }
    .container { padding: 20px; }
    input { display: block; margin: 10px 0; padding: 10px; width: 300px; }
    button { padding: 10px 20px; background: #00c853; border: none; color: white; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Checkout</h1>
    <form>
      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email" required>
      <input type="text" placeholder="Card Number" required>
      <input type="text" placeholder="Expiration Date" required>
      <input type="text" placeholder="CVV" required>
      <button type="submit">Pay $19.99</button>
    </form>
  </div>
</body>
</html>
