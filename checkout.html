

<!-- checkout.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checkout</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
body {font-family:Inter;background:#0b0b0c;color:white;padding:40px;}
.card {background:#151517;padding:20px;border-radius:20px;max-width:500px;margin:auto;}
.item {display:flex;justify-content:space-between;margin:10px 0;}
.total {font-size:20px;margin-top:20px;}
button {width:100%;padding:12px;margin-top:20px;background:#7c3aed;border:none;border-radius:10px;color:white;}
</style>
</head>
<body>

<div class="card">
<h1>Your Cart</h1>
<div id="cart-items"></div>
<div class="total" id="total"></div>
<button>Checkout</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let total = 0;

cart.forEach(item => {
  document.getElementById('cart-items').innerHTML += `<div class="item"><span>${item.name}</span><span>$${item.price}</span></div>`;
  total += item.price;
});

document.getElementById('total').innerText = 'Total: $' + total.toFixed(2);
</script>

</body>
</html>
